services:
  jsonhero:
    build:
      context: .
      dockerfile: Dockerfile
    image: jsonhero-web:local
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      SESSION_SECRET: "replace-with-a-long-random-secret"
      JSONHERO_STORAGE_DIR: "/data/documents"
      JSONHERO_DISABLE_OUTBOUND_NETWORK: "1"
    volumes:
      - jsonhero_data:/data
    restart: unless-stopped

volumes:
  jsonhero_data:
